schema: qa-driven

context: |
  Tech stack: Python ≥3.13.5, Poetry (primary) + uv (Docker), fully async (async/await)
  Package manager: Poetry (dev), uv (Docker/resolution)
  Web framework: FastAPI ≥0.120 + Uvicorn ASGI server (port 55300)
  Database: PostgreSQL 18 via raw asyncpg (no ORM) — 5 tables: providers, proxies, provider_proxy_status, api_keys, key_model_status
  LLM providers: No SDKs — raw httpx HTTP/2 calls to upstream APIs
  Scheduler: APScheduler with AsyncIOScheduler (background jobs)
  Configuration: Pydantic v2 BaseModel schema (src/config/schemas.py), YAML loader with env-var substitution + deepmerge for defaults
  Metrics: Prometheus (single + multiprocess backends via PROMETHEUS_MULTIPROC_DIR env var), metric prefix llm_gateway_*
  Docker: docker-compose up —build -d (PostgreSQL + Keeper + Conductor)
  Architecture: Clean Architecture / Hexagonal — layered async monolith with two runtime modes (Keeper background worker + Gateway FastAPI frontend)
  Folder src/config/ — Configuration layer (Pydantic schemas, YAML loader, defaults, error formatting)
  Folder src/core/ — Domain logic + abstractions (enums: ErrorReason/Status/DebugMode/StreamingMode/ProxyMode/ProviderType, interfaces: IProvider/IResourceSyncer/IResourceProbe/IMetricsCollector, dataclasses: CheckResult/RequestDetails, ConfigAccessor facade, HttpClientFactory, adaptive batching, retry utilities)
  Folder src/core/batching/ — AdaptiveBatchController (self-tuning batch size/delay)
  Folder src/db/ — Data access layer (Repository Pattern: ProviderRepository/KeyRepository/ProxyRepository, DatabaseManager facade, raw asyncpg connection pool)
  Folder src/metrics/ — Observability (IMetricsCollector with pluggable backends: Prometheus + in-memory, metric registry, endpoint auth)
  Folder src/providers/ — Strategy Pattern for LLM adapters (AIBaseProvider Template Method, impl/: OpenAILikeProvider/AnthropicProvider/GeminiProvider, factory via _PROVIDER_CLASSES registry)
  Folder src/services/ — Application orchestration: Keeper (keeper.py, key_probe.py, key_sync.py, key_purger.py, db_maintainer.py, inventory_exporter.py) and Gateway (gateway_service.py FastAPI app, gateway_cache.py in-memory key pools, response_forwarder.py, sanitize_content.py)
  Folder tests/ — 120 test files mirroring src/: unit/, integration/, e2e/, security/, test_batching/
  Domain: LLM provider API key management — Keeper (background health monitoring, key sync, purge, vacuum, inventory export) and Conductor (API gateway with key rotation, retry, streaming, debug modes)
  Key entities: Provider / Provider Instance — API Key — Key-Model Status — Proxy — Health Policy — Retry Policy — ErrorReason
  Design patterns: Dependency Inversion (interfaces in core/), Facade (ConfigAccessor, DatabaseManager), Template Method (AIBaseProvider, IResourceProbe), Strategy (provider adapters), Repository (db/database.py), Singleton (config, metrics collector), Two-Phase Apply-State Sync
  Error classification (docs/ERRORS.md): Fatal (INVALID_KEY/NO_ACCESS/NO_QUOTA/NO_MODEL) → immediate ban; Retryable (RATE_LIMITED/SERVER_ERROR/TIMEOUT/NETWORK_ERROR/OVERLOADED/SERVICE_UNAVAILABLE) → verification loop; Client (BAD_REQUEST/UNKNOWN) → soft penalty
  Health lifecycle: key → failing → quarantine → stop checking → purge (configurable thresholds per provider)
  Debug mode: DISABLED / NO_CONTENT (metadata only) / FULL_BODY (redact secrets). Enabling debug force-disables streaming and retry.
  Key files: API keys synced from data/<provider>/ directory (.txt / .ndjson), exported as NDJSON snapshots + status-grouped inventories
  Config schema root: Config (DatabaseConfig, LoggingConfig, KeeperConfig, MetricsConfig, GatewayConfig, dict of ProviderConfig)
  Docker: astral/uv:python3.13-trixie-slim base, CMD uvicorn main:app --host 0.0.0.0 --port 55300
  CI: GitHub Actions quality.yml — pyright strict, ruff check, black --check, pytest --cov=src, codecov push
  Code style: Python 3.13+ features (X | None not Optional[X]), no bare generics (dict[str, int] not dict), from __future__ import annotations for forward refs
  Naming: Variables/functions/methods: snake_case. Classes: PascalCase. Abstract classes/interfaces: I prefix (IProvider, IResourceSyncer, IMetricsCollector). Enums: PascalCase + @unique. Constants: UPPER_CASE. Private members: _ prefix. Test files: test_<snake_case>.py. Test classes: class Test<Thing>:. Test functions: test_<snake_case>
  Imports: Absolute only from src.* (never relative from .module). Order: stdlib → third-party → src.* (enforced by ruff TID + isort). TYPE_CHECKING guard to avoid runtime circular imports in core/interfaces.py
  Documentation: Google-style docstrings required on all public modules, classes, functions. Sections: one-line summary, Args:, Returns:, Raises:, Fields: (dataclasses). Sphinx cross-refs: `` :class:`~path.ClassName` ``
  Type checking: pyright typeCheckingMode basic globally, strict only on src/core and src/config. Python 3.13, Linux platform. src/core/http2/ excluded from type checking. reportMissingTypeStubs: false
  Formatting: Black + ruff format, line length 88, double quotes, 4-space indentation, trailing commas respected
  Linting: ruff rules E, F, W, I, B, C4, SIM, TID, UP, YTT. Ignored: E501 (line too long, delegated to formatter). Ruff acts as isort (known-first-party = ["src"])
  Testing: pytest ≥9.0 with pytest-asyncio (strict mode, no auto-detection). All async tests use @pytest.mark.asyncio decorator. asyncio_default_fixture_loop_scope = session. pytest-cov for coverage (no fail-under threshold). pytest-timeout = 30s. pytest-random-order. Flags: --strict-markers --strict-config
  Mocking: unittest.mock only (MagicMock, AsyncMock, patch). pytest-mock (mocker fixture) is intentionally absent. Fixtures in conftest.py or inline; factory fixtures return callables
  Test structure: tests/conftest.py CanonicalConfig session fixture (single source of truth parsed from .env.example + YAML). Custom markers: slow, postgres, meta. Test groups: unit/ (G1/G2), integration/ (G3), e2e/, security/, test_batching/ (G4), gatekeeper structural tests (G5), stress/ (G6 slow)
  HTTP/2: Custom CapacityAwareHttp2Transport in src/core/http2/ with connection pool and semaphore-based stream concurrency control. max_concurrent_streams_per_connection defaults to 5
  Database: Connection pool sizing validated at config load — worst_case = (gateway.workers + 1) × pool.max_size must stay under 97 (PostgreSQL 100 − 3 superuser reserve). AsyncRetrier with exponential backoff + jitter for transient pg errors
  Dataclasses: @dataclass(frozen=True) for immutable DTOs (RequestDetails, AdaptiveBatchingParams, KeyExportSnapshot, DatabaseTableHealth). Mutable dataclasses where mutation needed (CheckResult). TypedDict for structured dict shapes (KeyToCheck, AvailableKey, ValidKeyForCaching)
  We value backwards compatibility for all public provider interfaces (IProvider, IResourceSyncer, IResourceProbe)

rules:
  proposal:
    - Identify affected modules from the src/ structure (config, core, db, metrics, providers, services)
    - Specify which runtime mode is affected: Keeper, Conductor, or both
    - Flag any database schema changes (tables: providers, proxies, provider_proxy_status, api_keys, key_model_status)
    - Mark breaking changes to IProvider/IResourceSyncer/IResourceProbe/IMetricsCollector interfaces with **BREAKING**
    - If adding a new ProviderType, specify the new enum value and the provider adapter class
    - List any new dependencies and justify each
    - Include migration path for config schema changes (Pydantic model evolution)
    - Mention impact on health policy lifecycle (check → quarantine → stop → purge)
    - Reference affected docs (ERRORS.md, DEBUG_MODE.md) if behavior changes

  specs:
    - Use Given/When/Then format for all scenarios
    - Cover happy path, error cases, and edge cases for every behavior change
    - Every new ProviderType adapter MUST have scenarios for: parse_request_details, check, inspect, proxy_request
    - Include error scenarios covering all three tiers: fatal (INVALID_KEY/NO_ACCESS/NO_QUOTA/NO_MODEL), retryable (RATE_LIMITED/SERVER_ERROR/TIMEOUT/NETWORK_ERROR/OVERLOADED/SERVICE_UNAVAILABLE), client (BAD_REQUEST/UNKNOWN)
    - For Keeper changes: include sync phase scenarios (read + apply), probe batch scenarios, and purge scenarios
    - For Gateway changes: include routing scenarios (full stream vs buffered retryable), cache behavior, and key rotation scenarios
    - Every database schema change MUST have scenarios for migration, rollback, and data integrity
    - Every new metric MUST have scenarios for emission and label correctness
    - Include concurrency scenarios for shared-state components (gateway cache, connection pool)
    - Test functions must be async def with @pytest.mark.asyncio decorator. Use AsyncMock for async dependencies, unittest.mock only
    - Test files named test_<snake_case>.py, classes class Test<Thing>:, functions test_<snake_case>
    - Use CanonicalConfig session fixture for config values (never hardcode provider names, URLs, or tokens)
    - Tag scenarios requiring real network with @pytest.mark.slow, live PostgreSQL with @pytest.mark.postgres

  design:
    - Document database schema changes explicitly (table DDL, column types, constraints, indexes)
    - Include API contract diff when provider interfaces change (IProvider methods, ConfigAccessor methods)
    - List new Pydantic config models with their fields and validation rules
    - Justify every new dependency with version constraint and purpose
    - Document new ProviderType enum values and their adapter class registration
    - State whether the change is Keeper-only, Gateway-only, or shared (affects core/)
    - Include connection pool sizing impact if DB access patterns change
    - Describe async flow: coroutine chains, lock acquisition order, potential deadlocks
    - Document metrics additions: metric name, type (gauge/counter/histogram), labels
    - Include rollout strategy (can old and new code coexist? data migration needed?)
    - New core/ abstractions must use TYPE_CHECKING guards when referencing db/ or services/ types to prevent runtime circular imports
    - If adding files to src/core/http2/, note they are excluded from pyright type checking
    - Use @dataclass(frozen=True) for immutable DTOs, mutable dataclass only when mutation is required
    - Document expected test fixture setup: any new CanonicalConfig fields, conftest additions

  tasks:
    - Group database migration tasks under a separate heading
    - Group tasks by module: core/ → providers/ → db/ → services/ → config/ → metrics/
    - Every behavior change MUST have a corresponding test task (unit + integration)
    - Include type-checking task: run pyright and fix all errors
    - Include linting task: run ruff check src/ tests/ and fix all issues
    - Include formatting task: run black src/ tests/ (no errors)
    - Include CI verification task: confirm quality.yml passes (pyright + ruff + black + pytest + coverage)
    - For provider adapter changes: add test_<provider>.py under tests/unit/providers/impl/
    - For Keeper changes: add test under tests/unit/services/ or tests/integration/
    - For Gateway changes: add test under tests/unit/services/gateway/
    - Keep tasks atomic — each task should be completable in a single focused session
    - Tasks MUST use absolute imports (src.*), never relative imports
    - Tasks MUST follow type-strict conventions: all functions annotated, no bare generics
    - Include docstring task: verify Google-style docstrings on all new public entities
    - Run tests with: poetry run pytest --strict-markers --strict-config -m "not slow and not postgres" (add --run-postgres for DB tests)
    - New test fixtures must derive values from CanonicalConfig; never hardcode provider names, tokens, or URLs in tests
    - For async code, always use @pytest.mark.asyncio on test functions and AsyncMock for async dependencies
    - Use unittest.mock exclusively (MagicMock, AsyncMock, patch); do NOT introduce pytest-mock or mocker fixture
