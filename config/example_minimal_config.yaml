# examples/minimal_config.yaml
# This is a minimal configuration file with only the required settings.

# --- METRICS SETTINGS ---
metrics:
  # Enable or disable the /metrics endpoint for Prometheus
  enabled: false
  # Bearer token required to access the /metrics endpoint
  # Set to empty string to disable metrics endpoint even if enabled=true
  access_token: "${METRICS_ACCESS_TOKEN}"

# --- HTTP CLIENT SETTINGS ---
http_client:
  http2: true
  pool:
    max_connections: 100
    max_keepalive_connections: 20
    keepalive_expiry: 5.0

# --- KEEPER SETTINGS ---
keeper:
  max_concurrent_providers: 5

# --- DATABASE SETTINGS ---
database:
  # All database settings are loaded from environment variables.
  # See the .env.example file for details.
  host: "${DB_HOST}"
  port: ${DB_PORT}
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "${DB_NAME}"
  pool:
    command_timeout: 30.0
    connect_timeout: 60.0

# --- PROVIDER SETTINGS ---
providers:
  # Minimal configuration for a Gemini provider
  gemini-minimal:
    provider_type: "gemini"
    enabled: true

    api_base_url: "https://generativelanguage.googleapis.com"

    default_model:
      gemini-2.5-flash:
        endpoint_suffix: ":generateContent"
        test_payload:
          contents:
            - parts:
                - text: "Hello"

    access_control:
      gateway_access_token: "${GEMINI_MINIMAL_TOKEN}"
