# examples/full_config.yaml
# This configuration file is a comprehensive reference showing all available settings.
# Copy this file to 'config/providers.yaml' and edit it to suit your needs.

# --- LOGGING SETTINGS ---
# (Application logging only - statistics are now handled by Prometheus metrics)
logging:
  # The global log level for the application. Can be "DEBUG", "INFO", "WARNING", "ERROR".
  level: "INFO"

# --- METRICS SETTINGS ---
metrics:
  # Enable or disable the /metrics endpoint for Prometheus
  enabled: true
  # Bearer token required to access the /metrics endpoint
  # Set to empty string to disable metrics endpoint even if enabled=true
  access_token: "${METRICS_ACCESS_TOKEN}"

# --- GATEWAY SETTINGS ---
gateway:
  # Host to bind the API Gateway server to.
  host: "${GATEWAY_HOST}"
  # Port to bind the API Gateway server to.
  port: "${GATEWAY_PORT}"
  # Number of Uvicorn worker processes.
  workers: "${GATEWAY_WORKERS}"

# --- KEEPER SETTINGS ---
keeper:
  # Concurrency limit for the keeper's probes.
  max_concurrent_providers: 10

# --- DATABASE SETTINGS ---
database:
  # All database settings are loaded from environment variables.
  # See the .env.example file for details.
  host: "${DB_HOST}"
  port: ${DB_PORT}
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "${DB_NAME}"
  # Connection pool settings for asyncpg.
  pool:
    min_size: 1 # Minimum connections in the pool
    max_size: 15 # Maximum connections in the pool
  # Retry policy for transient database errors (connection lost, deadlock, etc.).
  # The background worker will automatically retry DB operations on these errors.
  retry:
    max_attempts: 3 # Maximum attempts including the first one (1..10)
    base_delay_sec: 1.0 # Delay before first retry in seconds
    backoff_factor: 2.0 # Exponential backoff multiplier (>= 1.0)
    jitter: true # Add random ±50% jitter to prevent thundering herd
  # Smart vacuum policy — replaces the old ritual weekly VACUUM
  # with interval-based conditional VACUUM ANALYZE.
  vacuum_policy:
    interval_minutes: 60 # Interval between vacuum health checks (minutes)
    dead_tuple_ratio_threshold: 0.3 # Trigger VACUUM when dead ratio exceeds 30%

# --- PROVIDER SETTINGS ---
providers:
  # Example 1: Google Gemini (Full Configuration)
  gemini-production:
    provider_type: "gemini"
    enabled: true

    api_base_url: "https://generativelanguage.googleapis.com"
    default_model: "gemini-2.5-flash"
    shared_key_status: false
    # Set to true to give this instance its own HTTP client pool (high-load instances)
    dedicated_http_client: false

    # Defined models for this provider
    models:
      gemini-2.5-flash:
        endpoint_suffix: ":generateContent"
        test_payload:
          contents:
            - parts:
                - text: "Hello"

      gemini-2.5-pro:
        endpoint_suffix: ":generateContent"
        test_payload:
          contents:
            - parts:
                - text: "Hello"

      imagen-3.0-generate-002:
        endpoint_suffix: ":predict"
        test_payload:
          instances:
            - prompt: "test image"

    # Access control for the Gateway API
    access_control:
      gateway_access_token: "${GEMINI_PROD_TOKEN}"

    # Proxy configuration
    proxy_config:
      mode: "none" # "none" or "static"
      # static_url: "http://user:pass@proxy:8080" # Required if mode is static

    timeouts:
      connect: 15.0
      read: 300.0
      write: 35.0
      pool: 35.0

    # Health check policy for the background worker
    worker_health_policy:
      # Intervals in Minutes
      on_server_error_min: 30
      on_overload_min: 30
      # Intervals in Hours
      on_other_error_hr: 1
      on_success_hr: 24
      on_rate_limit_hr: 1
      on_no_quota_hr: 6
      # Intervals in Days
      on_invalid_key_days: 10
      on_no_access_days: 10
      # Quarantine Policies
      quarantine_after_days: 30
      quarantine_recheck_interval_days: 10
      stop_checking_after_days: 90
      # Downtime Amnesty Policy
      # If a check is performed later than its scheduled time by more than this threshold,
      # the system assumes it was due to a downtime and resets the 'failing_since' counter.
      amnesty_threshold_days: 2.0
      # Adaptive Batching Configuration
      # The controller adjusts batch size and delay based on provider response:
      # - Any RATE_LIMITED → aggressive backoff (batch_size //= 2, delay *= 2)
      # - Transient errors > failure_rate_threshold → moderate backoff
      # - Fatal errors (invalid key, no access) → ignored (key-specific)
      # - Success → gradual ramp-up; accelerated after recovery_threshold
      adaptive_batching:
        # Start values — initial batch size/delay for the adaptive controller.
        start_batch_size: 10 # Initial batch size (must be within [min, max])
        start_batch_delay_sec: 30.0 # Initial delay in seconds
        # Boundaries: batch size never drops below min nor exceeds max
        min_batch_size: 5 # Lower bound (default: 5)
        max_batch_size: 50 # Upper bound (default: 50)
        # Boundaries: delay never goes below min nor above max (seconds)
        min_batch_delay_sec: 3.0 # Minimum pause between batches (default: 3.0)
        max_batch_delay_sec: 120.0 # Maximum pause under heavy throttling (default: 120.0)
        # Step sizes: how fast the controller adjusts
        batch_size_step: 5 # Keys added/removed per step (default: 5)
        delay_step_sec: 2.0 # Seconds added/removed per step (default: 2.0)
        # Rate-limit reaction (multipliers — aggressive)
        rate_limit_divisor: 2 # batch_size //= divisor (default: 2)
        rate_limit_delay_multiplier: 2.0 # delay *= multiplier (default: 2.0)
        # Recovery: after N consecutive successes, step size doubles
        recovery_threshold: 5 # Consecutive successes for fast recovery (default: 5)
        recovery_step_multiplier: 2.0 # Step multiplier during recovery (default: 2.0)
        # Moderate backoff threshold: transient > this fraction → slow down
        failure_rate_threshold: 0.3 # 30% transient errors in non-fatal results (default: 0.3)
      # Maximum time in seconds a single probe task is allowed to run before being force-cancelled.
      # This prevents "zombie" tasks from hanging indefinitely and blocking the dispatcher.
      task_timeout_sec: 900
      # Verification Loop Configuration
      # How many times to re-verify a key after a retryable error (e.g., rate limit).
      verification_attempts: 3
      verification_delay_sec: 65
      # Purge Configuration — automatic removal of permanently stopped keys
      purge:
        after_days: 180

    # --- Key Export Configuration ---
    # Export current key state to NDJSON files.
    # Everything is disabled by default.
    key_export:
      enabled: false # Master switch: false — no export operations run
      clean_raw_after_sync: true # Delete raw files after successful DB sync
      snapshot_interval_hours: 0 # Full snapshot interval (0 = disabled)
      inventory:
        enabled: false # Enable status-based inventory export
        interval_minutes: 1440 # Interval between inventory cycles (minutes)
        statuses: [valid] # Statuses to export: valid, no_quota, rate_limited, ...

    # Configuration for parsing error responses to refine error classification.
    # This enables distinguishing between different error types with the same HTTP status code.
    # Supports two matching modes:
    #   - Dot-path mode: error_path like "error.status" extracts a JSON field.
    #   - Fulltext mode: error_path "$" applies regex to the entire raw response body.
    error_parsing:
      enabled: false # Default is false to maintain Zero-Overhead behavior
      rules:
        - status_code: 400
          error_path: "error.status"
          match_pattern: "INVALID_ARGUMENT"
          map_to: "invalid_key"
          # Priority determines which rule wins if multiple rules match the same status_code.
          # Higher values = Higher priority.
          # Useful for defining specific matches (e.g. priority 100) vs catch-alls (e.g. priority 0).
          priority: 10
          description: "Gemini invalid API key"

    # Gateway specific policies
    gateway_policy:
      streaming_mode: "auto" # "auto" or "disabled"
      debug_mode: "disabled" # "disabled", "no_content", "full_body"

      retry:
        enabled: true
        on_key_error:
          attempts: 3
          # Key Storm Protection:
          # Delays key rotation to prevent hammering the DB if all keys are failing.
          backoff_sec: 0.1
          backoff_factor: 1.5
        on_server_error:
          attempts: 5
          backoff_sec: 0.5
          backoff_factor: 2.0

  # Example 2: OpenAI-compatible Provider (e.g. DeepSeek, Moonshot)
  deepseek-main:
    provider_type: "openai_like"
    enabled: true

    api_base_url: "https://api.deepseek.com/v1"
    default_model: "deepseek-chat"
    dedicated_http_client: false

    models:
      deepseek-chat:
        endpoint_suffix: "/chat/completions"
        test_payload:
          messages:
            - role: "user"
              content: "Hi"
          max_tokens: 1

    access_control:
      gateway_access_token: "${DEEPSEEK_TOKEN}"

    # Using default health and gateway policies by omitting them
    proxy_config:
      mode: "none"

  # Example 3: Anthropic Provider (Claude models)
  anthropic-production:
    provider_type: "anthropic"
    enabled: true

    api_base_url: "https://api.anthropic.com"
    default_model: "claude-sonnet-4-20250514"
    dedicated_http_client: false

    models:
      claude-sonnet-4-20250514:
        endpoint_suffix: "/v1/messages"
        test_payload:
          model: "claude-sonnet-4-20250514"
          messages:
            - role: "user"
              content: "Hi"
          max_tokens: 1

      claude-opus-4-20250514:
        endpoint_suffix: "/v1/messages"
        test_payload:
          model: "claude-opus-4-20250514"
          messages:
            - role: "user"
              content: "Hi"
          max_tokens: 1

    access_control:
      gateway_access_token: "${ANTHROPIC_TOKEN}"

    timeouts:
      connect: 15.0
      read: 300.0
      write: 35.0
      pool: 35.0

    worker_health_policy:
      # Intervals in Minutes
      on_server_error_min: 30
      on_overload_min: 30
      # Intervals in Hours
      on_other_error_hr: 1
      on_success_hr: 24
      on_rate_limit_hr: 1
      on_no_quota_hr: 6
      # Intervals in Days
      on_invalid_key_days: 10
      on_no_access_days: 10
      # Quarantine Policies
      quarantine_after_days: 30
      quarantine_recheck_interval_days: 10
      stop_checking_after_days: 90
      # Downtime Amnesty Policy
      # If a check is performed later than its scheduled time by more than this threshold,
      # the system assumes it was due to a downtime and resets the 'failing_since' counter.
      amnesty_threshold_days: 2.0
      # Adaptive Batching Configuration
      adaptive_batching:
        start_batch_size: 10
        start_batch_delay_sec: 30.0
      task_timeout_sec: 900
      # Verification Loop Configuration
      verification_attempts: 3
      verification_delay_sec: 65

    gateway_policy:
      streaming_mode: "auto"
      debug_mode: "disabled"

      retry:
        enabled: true
        on_key_error:
          attempts: 3
          backoff_sec: 0.1
          backoff_factor: 1.5
        on_server_error:
          attempts: 5
          backoff_sec: 0.5
          backoff_factor: 2.0

    proxy_config:
      mode: "none"
