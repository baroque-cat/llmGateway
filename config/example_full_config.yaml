# examples/full_config.yaml
# This configuration file is a comprehensive reference showing all available settings.
# Copy this file to 'config/providers.yaml' and edit it to suit your needs.

# --- LOGGING SETTINGS ---
# (Application logging only - statistics are now handled by Prometheus metrics)
logging:
  # The global log level for the application. Can be "DEBUG", "INFO", "WARNING", "ERROR".
  level: "INFO"
  # Independent log level control for HTTP client libraries (httpx, httpcore).
  http_client:
    httpx_level: "WARNING"
    httpcore_level: "WARNING"
    # Set to True for per-request httpx trace events via extensions={"trace": handler}.
    trace_enabled: false

# --- HTTP CLIENT SETTINGS ---
http_client:
  # Enable or disable HTTP/2 for upstream connections.
  http2: true
  # Connection pool limits applied globally to all httpx.AsyncClient instances.
  pool:
    max_connections: 200
    max_keepalive_connections: 50
    keepalive_expiry: 30.0
  # Interval in seconds for periodic INFO-level pool health logging.
  # Set to 0 to disable.
  pool_health_log_interval_sec: 60

# --- METRICS SETTINGS ---
metrics:
  # Enable or disable the /metrics endpoint for Prometheus
  enabled: true
  # Bearer token required to access the /metrics endpoint
  # Set to empty string to disable metrics endpoint even if enabled=true
  access_token: "${METRICS_ACCESS_TOKEN}"

# --- GATEWAY SETTINGS ---
gateway:
  # Host to bind the API Gateway server to.
  host: "${GATEWAY_HOST}"
  # Port to bind the API Gateway server to.
  port: "${GATEWAY_PORT}"
  # Number of Uvicorn worker processes.
  workers: "${GATEWAY_WORKERS}"

# --- KEEPER SETTINGS ---
keeper:
  # Concurrency limit for the keeper's probes.
  max_concurrent_providers: 10

# --- DATABASE SETTINGS ---
database:
  # All database settings are loaded from environment variables.
  # See the .env.example file for details.
  host: "${DB_HOST}"
  port: ${DB_PORT}
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "${DB_NAME}"
  # Connection pool settings for asyncpg.
  pool:
    min_size: 1 # Minimum connections in the pool
    max_size: 15 # Maximum connections in the pool
    command_timeout: 30.0 # Max time for a single query before cancellation
    timeout: 60.0 # Max time for TCP connection handshake
  # Retry policy for transient database errors (connection lost, deadlock, etc.).
  # The background worker will automatically retry DB operations on these errors.
  retry:
    max_attempts: 3 # Maximum attempts including the first one (1..10)
    base_delay_sec: 1.0 # Delay before first retry in seconds
    backoff_factor: 2.0 # Exponential backoff multiplier (>= 1.0)
    jitter: true # Add random ±50% jitter to prevent thundering herd
  # Smart vacuum policy — replaces the old ritual weekly VACUUM
  # with interval-based conditional VACUUM ANALYZE.
  vacuum_policy:
    interval_minutes: 60 # Interval between vacuum health checks (minutes)
    dead_tuple_ratio_threshold: 0.3 # Trigger VACUUM when dead ratio exceeds 30%

# --- PROVIDER SETTINGS ---
providers:
  # Example 1: Google Gemini (Full Configuration)
  gemini-production:
    provider_type: "gemini"
    enabled: true

    api_base_url: "https://generativelanguage.googleapis.com"
    # Set to true to give this instance its own HTTP client pool (high-load instances)
    dedicated_http_client: true

    # Defined models for this provider (used by Keeper for health checks)
    default_model:
      gemini-2.5-flash:
        endpoint_suffix: ":generateContent"
        test_payload:
          contents:
            - parts:
                - text: "Hello"

    # Access control for the Gateway API
    access_control:
      gateway_access_token: "${GEMINI_PROD_TOKEN}"

    # Proxy configuration
    proxy_config:
      mode: "none" # "none" or "static"
      # static_url: "http://user:pass@proxy:8080" # Required if mode is static

    timeouts:
      connect: 10.0
      read: 120.0
      write: 20.0
      pool: 15.0
      total: 600.0

    # Health check policy for the background worker
    worker_health_policy:
      # Intervals in Minutes
      on_server_error_min: 30
      on_overload_min: 30
      # Intervals in Hours
      on_other_error_hr: 1
      on_success_hr: 24
      on_rate_limit_hr: 1
      on_no_quota_hr: 6
      # Intervals in Days
      on_invalid_key_days: 10
      on_no_access_days: 10
      # Quarantine Policies
      quarantine_after_days: 30
      quarantine_recheck_interval_days: 10
      stop_checking_after_days: 90
      # Downtime Amnesty Policy
      # If a check is performed later than its scheduled time by more than this threshold,
      # the system assumes it was due to a downtime and resets the 'failing_since' counter.
      amnesty_threshold_days: 2.0
      # Adaptive Batching Configuration
      # The controller adjusts batch size and delay based on provider response:
      # - Any RATE_LIMITED → aggressive backoff (batch_size //= 2, delay *= 2)
      # - Transient errors > failure_rate_threshold → moderate backoff
      # - Fatal errors (invalid key, no access) → ignored (key-specific)
      # - Success → gradual ramp-up; accelerated after recovery_threshold
      adaptive_batching:
        # Start values — initial batch size/delay for the adaptive controller.
        start_batch_size: 10 # Initial batch size (must be within [min, max])
        start_batch_delay_sec: 30.0 # Initial delay in seconds
        # Boundaries: batch size never drops below min nor exceeds max
        min_batch_size: 5 # Lower bound (default: 5)
        max_batch_size: 50 # Upper bound (default: 50)
        # Boundaries: delay never goes below min nor above max (seconds)
        min_batch_delay_sec: 3.0 # Minimum pause between batches (default: 3.0)
        max_batch_delay_sec: 120.0 # Maximum pause under heavy throttling (default: 120.0)
        # Step sizes: how fast the controller adjusts
        batch_size_step: 5 # Keys added/removed per step (default: 5)
        delay_step_sec: 2.0 # Seconds added/removed per step (default: 2.0)
        # Rate-limit reaction (multipliers — aggressive)
        rate_limit_divisor: 2 # batch_size //= divisor (default: 2)
        rate_limit_delay_multiplier: 2.0 # delay *= multiplier (default: 2.0)
        # Recovery: after N consecutive successes, step size doubles
        recovery_threshold: 5 # Consecutive successes for fast recovery (default: 5)
        recovery_step_multiplier: 2.0 # Step multiplier during recovery (default: 2.0)
        # Moderate backoff threshold: transient > this fraction → slow down
        failure_rate_threshold: 0.3 # 30% transient errors in non-fatal results (default: 0.3)
      # Maximum time in seconds a single probe task is allowed to run before being force-cancelled.
      # This prevents "zombie" tasks from hanging indefinitely and blocking the dispatcher.
      task_timeout_sec: 900
      # Verification Loop Configuration
      # How many times to re-verify a key after a retryable error (e.g., rate limit).
      verification_attempts: 3
      verification_delay_sec: 65
      # Purge Configuration — automatic removal of permanently stopped keys
      purge:
        after_days: 180

    # --- Key Export Configuration ---
    # Export current key state to NDJSON files.
    # Everything is disabled by default.
    key_export:
      enabled: false # Master switch: false — no export operations run
      clean_raw_after_sync: true # Delete raw files after successful DB sync
      snapshot_interval_hours: 0 # Full snapshot interval (0 = disabled)
      inventory:
        enabled: false # Enable status-based inventory export
        interval_minutes: 1440 # Interval between inventory cycles (minutes)
        statuses: [valid] # Statuses to export: valid, no_quota, rate_limited, ...

    # Configuration for parsing error responses to refine error classification.
    # This enables distinguishing between different error types with the same HTTP status code.
    # Supports two matching modes:
    #   - Dot-path mode: error_path like "error.status" extracts a JSON field.
    #   - Fulltext mode: error_path "$" applies regex to the entire raw response body.
    error_parsing:
      enabled: false # Default is false to maintain Zero-Overhead behavior
      rules:
        - status_code: 400
          error_path: "error.status"
          match_pattern: "INVALID_ARGUMENT"
          map_to: "invalid_key"
          # Priority determines which rule wins if multiple rules match the same status_code.
          # Higher values = Higher priority.
          # Useful for defining specific matches (e.g. priority 100) vs catch-alls (e.g. priority 0).
          priority: 10
          description: "Gemini invalid API key"

    # Gateway specific policies
    gateway_policy:
      streaming_mode: "auto" # "auto" or "disabled"
      debug_mode: "disabled" # "disabled", "no_content", "full_body"

      retry:
        enabled: true
        on_key_error:
          attempts: 3
          # Key Storm Protection:
          # Delays key rotation to prevent hammering the DB if all keys are failing.
          backoff_sec: 0.1
          backoff_factor: 1.5
        on_server_error:
          attempts: 5
          backoff_sec: 0.5
          backoff_factor: 2.0

  # Example 2: OpenAI-compatible Provider (e.g. DeepSeek, Moonshot)
  deepseek-main:
    provider_type: "openai_like"
    enabled: true

    api_base_url: "https://api.deepseek.com"
    dedicated_http_client: true

    default_model:
      deepseek-chat:
        endpoint_suffix: "/v1/chat/completions"
        test_payload:
          messages:
            - role: "user"
              content: "Hi"
          max_tokens: 1

    access_control:
      gateway_access_token: "${DEEPSEEK_TOKEN}"

    # Using default health and gateway policies by omitting them
    proxy_config:
      mode: "none"

  # Example 3: Anthropic Provider (Claude models)
  anthropic-production:
    provider_type: "anthropic"
    enabled: true

    api_base_url: "https://api.anthropic.com"
    dedicated_http_client: true

    default_model:
      claude-sonnet-4-20250514:
        endpoint_suffix: "/v1/messages"
        test_payload:
          model: "claude-sonnet-4-20250514"
          messages:
            - role: "user"
              content: "Hi"
          max_tokens: 1

      claude-opus-4-20250514:
        endpoint_suffix: "/v1/messages"
        test_payload:
          model: "claude-opus-4-20250514"
          messages:
            - role: "user"
              content: "Hi"
          max_tokens: 1

    access_control:
      gateway_access_token: "${ANTHROPIC_TOKEN}"

    timeouts:
      connect: 10.0
      read: 120.0
      write: 20.0
      pool: 15.0
      total: 600.0

    worker_health_policy:
      # Intervals in Minutes
      on_server_error_min: 30
      on_overload_min: 30
      # Intervals in Hours
      on_other_error_hr: 1
      on_success_hr: 24
      on_rate_limit_hr: 1
      on_no_quota_hr: 6
      # Intervals in Days
      on_invalid_key_days: 10
      on_no_access_days: 10
      # Quarantine Policies
      quarantine_after_days: 30
      quarantine_recheck_interval_days: 10
      stop_checking_after_days: 90
      # Downtime Amnesty Policy
      # If a check is performed later than its scheduled time by more than this threshold,
      # the system assumes it was due to a downtime and resets the 'failing_since' counter.
      amnesty_threshold_days: 2.0
      # Adaptive Batching Configuration
      adaptive_batching:
        start_batch_size: 10
        start_batch_delay_sec: 30.0
      task_timeout_sec: 900
      # Verification Loop Configuration
      verification_attempts: 3
      verification_delay_sec: 65

    gateway_policy:
      streaming_mode: "auto"
      debug_mode: "disabled"

      retry:
        enabled: true
        on_key_error:
          attempts: 3
          backoff_sec: 0.1
          backoff_factor: 1.5
        on_server_error:
          attempts: 5
          backoff_sec: 0.5
          backoff_factor: 2.0

    proxy_config:
      mode: "none"

  # Example 4: Alibaba Qwen via DashScope (Dual-Protocol Provider)
  # DashScope offers TWO API protocols from the same api_base_url:
  #   1. OpenAI-compatible:    https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  #   2. DashScope native SDK: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
  #
  # Because the transparent proxy passes the client's original path through
  # unchanged (it never validates or transforms the body), BOTH protocols can
  # flow through the SAME provider instance simultaneously:
  #   - OpenAI-compatible clients send: POST /compatible-mode/v1/chat/completions
  #     → upstream URL: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  #   - DashScope native clients send: POST /api/v1/services/aigc/text-generation/generation
  #     → upstream URL: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
  #
  # HOWEVER, there is one critical difference: ERROR BODY FORMATS.
  #
  # OpenAI-compatible errors are nested under an "error" key:
  #   {"error": {"code": "Arrearage", "message": "Access denied...", "type": "..."}}
  #
  # DashScope native errors place fields at the JSON root level (NO "error" wrapper):
  #   {"code": "Arrearage", "message": "Access denied...", "request_id": "..."}
  #
  # If you use only error_path: "error.code" rules, DashScope native errors
  # will silently degrade to BAD_REQUEST because _extract_json_value() cannot
  # find the "error" key in the root JSON object (it returns None → rule skipped).
  #
  # SOLUTION: Define DUAL-FORMAT rules — one set for the OpenAI-compatible
  # nested format ("error.code" / "error.message"), and a second set for the
  # DashScope-native flat format ("code" / "message"). These two sets are
  # naturally mutually exclusive: a given error body either HAS an "error" key
  # (OpenAI-compatible) or does NOT (DashScope native), so exactly one set matches.
  #
  # IMPORTANT FOR THE KEEPER:
  # The keeper performs health checks against the URL defined by endpoint_suffix
  # (below). It does NOT see mixed traffic — it only hits one endpoint. Here,
  # endpoint_suffix points to the OpenAI-compatible endpoint, so the keeper
  # only receives OpenAI-formatted errors. The keeper has a special 400→INVALID_KEY
  # override (because a pre-determined test payload means 400 = bad key).
  # However, _refine_error_reason() runs AFTER that override and can reclassify
  # the error — for example, "Arrearage" (billing) → NO_QUOTA instead of INVALID_KEY.
  #
  # If you later switch endpoint_suffix to the DashScope native path, the dual-format
  # rules will handle the native error format correctly in the keeper as well.
  qwen-home:
    # provider_type is the Keeper's protocol for health checks.
    # The gateway uses it to instantiate the correct provider class
    # (OpenAILikeProvider → Authorization: Bearer, Content-Type: application/json).
    provider_type: "openai_like"
    enabled: true

    # Base URL for ALL DashScope API calls (both compatible-mode and native SDK).
    # The client's original request path is appended directly to this URL.
    api_base_url: "https://dashscope.aliyuncs.com"
    dedicated_http_client: true

    # Models used by the Keeper for health checks.
    # endpoint_suffix is the URL path appended to api_base_url for the test request.
    # Here we use the OpenAI-compatible endpoint for health checks.
    # To check the native endpoint instead, change to:
    #   endpoint_suffix: "/api/v1/services/aigc/text-generation/generation"
    default_model:
      qwen3-max-2026-01-23:
        endpoint_suffix: "/compatible-mode/v1/chat/completions"
        test_payload:
          messages:
            - role: "user"
              content: "Hi"
          max_tokens: 1

    access_control:
      gateway_access_token: "${QWEN_HOME_TOKEN}"

    proxy_config:
      mode: "none"

    timeouts:
      connect: 10.0
      read: 120.0
      write: 20.0
      pool: 15.0
      total: 600.0

    worker_health_policy:
      on_server_error_min: 30
      on_overload_min: 30
      on_other_error_hr: 1
      on_success_hr: 24
      on_rate_limit_hr: 1
      on_no_quota_hr: 6
      on_invalid_key_days: 10
      on_no_access_days: 10
      quarantine_after_days: 30
      quarantine_recheck_interval_days: 10
      stop_checking_after_days: 90
      amnesty_threshold_days: 2.0
      adaptive_batching:
        start_batch_size: 10
        start_batch_delay_sec: 30.0
      task_timeout_sec: 900
      verification_attempts: 3
      verification_delay_sec: 65

    # --- Dual-Format Error Parsing for Mixed OpenAI-Compatible + DashScope Native Traffic ---
    #
    # This configuration distinguishes error types WITHIN HTTP 400 responses.
    # DashScope uses HTTP 400 for billing errors ("Arrearage"), auth failures,
    # content safety ("DataInspectionFailed"), and invalid parameters —
    # unlike OpenAI which uses distinct status codes (401, 402, etc.).
    #
    # Two matching modes are supported:
    #   DOT-PATH MODE: error_path like "error.code" extracts a JSON field from
    #     the parsed body via _extract_json_value(). The extracted string value
    #     is matched against match_pattern (case-insensitive regex).
    #     Missing intermediate keys return None → rule is silently skipped.
    #
    #   FULLTEXT MODE: error_path "$" applies match_pattern against the entire
    #     raw response body (UTF-8 decoded). Useful for catch-all rules or when
    #     the JSON structure is unpredictable.
    #
    # Priority determines which rule "wins" when multiple rules match the same
    # error response. Higher = higher priority. Rules within the same status_code
    # MUST have unique priorities (enforced by Pydantic validator).
    #
    # The dual-format pattern below uses slightly LOWER priorities for DashScope
    # native rules than their OpenAI counterparts (95 vs 100, 85 vs 90, etc.).
    # Since the two formats are mutually exclusive (a response either HAS an
    # "error" key or does NOT), the priority offset is a safety measure — not
    # strictly required, but ensures predictable behavior if both formats
    # somehow coexist in a single response.
    error_parsing:
      enabled: true
      rules:
        # === OpenAI-compatible format: {"error": {"code": "...", "message": "..."}} ===

        - status_code: 400
          error_path: "error.code"
          match_pattern: "Arrearage"
          map_to: "no_quota"
          priority: 100
          description: "OpenAI-compatible: billing/account arrears → treat as NO_QUOTA (fatal, key banned)"

        - status_code: 400
          error_path: "error.code"
          match_pattern: "InvalidApiKey"
          map_to: "invalid_key"
          priority: 90
          description: "OpenAI-compatible: invalid API key → treat as INVALID_KEY (fatal, key banned)"

        - status_code: 400
          error_path: "error.message"
          match_pattern: "Access denied"
          map_to: "no_access"
          priority: 80
          description: "OpenAI-compatible: region/permission denied → treat as NO_ACCESS (fatal, key banned)"

        # === DashScope native format: {"code": "...", "message": "..."} (flat, no "error" wrapper) ===

        - status_code: 400
          error_path: "code"
          match_pattern: "Arrearage"
          map_to: "no_quota"
          priority: 95
          description: "DashScope native: billing/account arrears → treat as NO_QUOTA (fatal, key banned)"

        - status_code: 400
          error_path: "code"
          match_pattern: "InvalidApiKey"
          map_to: "invalid_key"
          priority: 85
          description: "DashScope native: invalid API key → treat as INVALID_KEY (fatal, key banned)"

        - status_code: 400
          error_path: "code"
          match_pattern: "APIConnectionError"
          map_to: "network_error"
          priority: 78
          description: "DashScope native: upstream connection error → treat as NETWORK_ERROR"

        - status_code: 400
          error_path: "message"
          match_pattern: "Access denied"
          map_to: "no_access"
          priority: 75
          description: "DashScope native: region/permission denied → treat as NO_ACCESS (fatal, key banned)"

        # === Catch-all rule — triggers when no specific rule matches ===
        # Without this, unmatched 400 errors would fall through to the provider's
        # _map_status_code_to_reason(400) → BAD_REQUEST (client error, no key penalty).
        # This catch-all preserves that behavior explicitly.

        - status_code: 400
          error_path: "$"
          match_pattern: ".*"
          map_to: "bad_request"
          priority: 0
          description: "Catch-all: any unrecognized 400 → BAD_REQUEST (no key penalty for unknown error types)"

        # === Rate limiting (both protocols use the same HTTP 429) ===

        - status_code: 429
          error_path: "$"
          match_pattern: ".*"
          map_to: "rate_limited"
          priority: 0
          description: "Any 429 → RATE_LIMITED (key penalized, retry after cooldown)"

    gateway_policy:
      streaming_mode: "auto"
      debug_mode: "disabled"

      retry:
        enabled: true
        on_key_error:
          attempts: 3
          backoff_sec: 0.1
          backoff_factor: 1.5
        on_server_error:
          attempts: 5
          backoff_sec: 0.5
          backoff_factor: 2.0
