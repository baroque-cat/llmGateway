services:
  database:
    image: postgres:18-alpine
    container_name: llmgateway_postgres_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_gateway -d llmgateway"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - llmgateway_net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: llmgateway:latest
    container_name: llmgateway_gateway
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "${GATEWAY_HOST}",
        "--port",
        "${GATEWAY_PORT}",
        "--workers",
        "${GATEWAY_WORKERS}",
      ]
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    # All configuration is loaded from the .env file.
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:rw
    depends_on:
      database:
        condition: service_healthy
    networks:
      - llmgateway_net
    security_opt:
      - no-new-privileges:true

  keeper:
    image: llmgateway:latest
    container_name: llmgateway_keeper
    command: ["python", "main.py", "keeper"]
    restart: unless-stopped
    environment:
      - KEEPER_METRICS_PORT=${KEEPER_METRICS_PORT}
    # All configuration is loaded from the .env file.
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:rw
    userns_mode: keep-id
    depends_on:
      database:
        condition: service_healthy
    networks:
      - llmgateway_net
    security_opt:
      - no-new-privileges:true
    # Keeper exposes internal /metrics on port 9090 (not mapped externally)

volumes:
  pg_data:

networks:
  llmgateway_net:
    driver: bridge
